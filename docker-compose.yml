services:
  backend:
    build: ./backend
    ports:
      - "8007:8007"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8007
    ports:
      - "3007:3007"
    environment:
      - BACKEND_URL=http://backend:8007
    depends_on:
      - backend
    restart: unless-stopped
